name: Automated Build and Commit dist
on:
    push:
        branches:
            - main

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build project
              run: npm run build

            - name: Commit and Push dist folder
              run: |
                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  git add -f dist/

                  if git diff-index --quiet HEAD -- dist/; then
                    echo "No changes detected in dist folder. Skipping commit."
                  else
                    git commit -m "chore: automatically update dist folder [skip ci]"
                    git push
                  fi
